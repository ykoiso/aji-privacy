<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プライバシーポリシー - アジ釣りカウンター</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.7;
            color: #333;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 680px; /* 横幅が広がりすぎないように制限 */
            margin: 0 auto;
            padding: 40px 20px; /* スマホ画面の左右にほどよい余白を作る */
            background-color: #fff;
        }
        h1 {
            font-size: 24px;
            border-bottom: 2px solid #007aff; /* 爽やかなブルーのアクセントライン */
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        h2 {
            font-size: 18px;
            margin-top: 30px;
            border-left: 4px solid #007aff; /* 見出しの左側に縦線を入れて見やすく */
            padding-left: 10px;
        }
        p {
            font-size: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    </div>

</body>
</html>
